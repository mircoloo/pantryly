<!DOCTYPE html>
<html>
<head>
    <title>Posts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<div class="container mt-4">

  <h1 class="mb-4">Products</h1>

  <div class="row">
    {% for post in posts %}
      <div class="col-md-4">
        <div class="card mb-3 shadow-sm">
          <div class="card-body">
            <h5 class="card-title">{{ post.name }}</h5>
            
            <p class="card-text">
              <strong>ID:</strong> {{ post.id }}
            </p>

            <p class="card-text">
              <strong>Barcode:</strong> {{ post.barcode }}
            </p>

            <p class="card-text">
              <strong>Expiration:</strong> {{ post.expiration_date }}
            </p>

          </div>
        </div>
      </div>
    {% endfor %}
  </div>

</div>

</body>
</html>
